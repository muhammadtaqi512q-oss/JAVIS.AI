<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT | Web Builder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: #f5f5f5; font-family: "Inter", sans-serif; }
        .loader-container { display: flex; justify-content: center; align-items: center; height: 100%; width: 100%; position: absolute; top: 0; left: 0; background: #f5f5f5; z-index: 9999; transition: opacity 0.4s ease; }
        .loader-text { color: #151617; font-size: 16px; font-weight: 500; }
        #secure-env { width: 100%; height: 100%; position: relative; }
    </style>
</head>
<body>

    <div class="loader-container" id="main-loader">
        <div class="loader-text">Loading Secure Environment...</div>
    </div>

    <div id="secure-env"></div>

    <script>
        // Anti-Inspect / Ctrl+U Lock
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) {
                e.preventDefault();
                return false;
            }
        });

        // Fast jsDelivr CDN call (YOUR_REPO_NAME compile.js se automatic JAVIS.AI ban jayega)
        const targetUrl = `https://cdn.jsdelivr.net/gh/muhammadtaqi512q-oss/YOUR_REPO_NAME@main/data.txt`;

        fetch(targetUrl, { cache: "no-store" })
            .then(res => { if (!res.ok) throw new Error(); return res.text(); })
            .then(encrypted => {
                document.getElementById('secure-env').innerHTML = atob(encrypted.trim());
                const loader = document.getElementById("main-loader");
                const iframe = document.getElementById("preview-iframe");
                
                if (iframe) {
                    iframe.addEventListener("load", () => hideLoader(loader));
                    setTimeout(() => hideLoader(loader), 2500); // Fail-safe
                } else {
                    hideLoader(loader);
                }
            })
            .catch(() => {
                document.querySelector(".loader-text").innerText = "Security Handshake Failed.";
            });

        function hideLoader(el) {
            if (el) { el.style.opacity = "0"; setTimeout(() => el.style.display = "none", 400); }
        }
    </script>
</body>
</html>
