<!DOCTYPE html>
<html lang="en">
<head>
    <title>< M BOX ></title>
    <!-- CSS Styles omitted for brevity, use the styles you already have from previous responses -->
    <style>
        /* Place all of your existing CSS styles here */
        :root { /* ... your styles ... */ }
        body { /* ... your styles ... */ }
        /* ... etc. ... */
    </style>
    <script>
        function showCreatorAlert() {
            alert("Website Creator: ꧁༒𝓜𝓾𝓱𝓪𝓶𝓶𝓪𝓭𝓣𝓪𝓺𝓲༒꧂");
        }
    </script>
</head>
<body onload="showCreatorAlert()">
    <div class="container">
        <header>
            <h1> M BOX </h1>
            <p>Your premium file management solution, created by ꧁༒𝓜𝓾𝓱𝓪𝓶𝓶𝓪𝓭𝓣𝓪𝓺𝓲༒꧂.</p>
        </header>
        <main>
            <section>
                <h2>Upload Your Files</h2>
                <label for="file-upload" class="custom-file-upload">
                    Choose Image
                </label>
                <input type="file" id="file-upload" accept="image/*" multiple>
                <div id="image-preview-area"></div>
            </section>
        </main>
    </div>

    <!-- The JavaScript section you need to use -->
    <script>
        // Get the input element and the preview area
        const fileInput = document.getElementById('file-upload');
        const previewArea = document.getElementById('image-preview-area');

        // Function to upload a single file to the server (Client-side mechanism)
        async function uploadFileToServer(file) {
            const formData = new FormData();
            formData.append('imageFile', file); 

            try {
                // This calls the 'upload.php' file on your server
                const response = await fetch('upload.php', { 
                    method: 'POST',
                    body: formData,
                });

                if (response.ok) {
                    const data = await response.json();
                    return data.imageUrl; 
                } else {
                    console.error('Upload failed:', response.statusText);
                    return null;
                }
            } catch (error) {
                console.error('Upload error:', error);
                alert("Server connection failed. Images are only visible locally.");
                return null;
            }
        }

        // Listen for changes on the file input
        fileInput.addEventListener('change', async function(event) {
            const files = event.target.files;
            
            for (const file of files) {
                if (file.type.startsWith('image/')) {
                    // Display local preview
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const container = document.createElement('div');
                        container.classList.add('uploaded-image-container');
                        const img = document.createElement('img');
                        img.src = e.target.result; 
                        img.classList.add('uploaded-image');
                        img.addEventListener('contextmenu', (e) => e.preventDefault());
                        const removeBtn = document.createElement('button');
                        removeBtn.classList.add('remove-image-btn');
                        removeBtn.textContent = '×';
                        removeBtn.title = 'Remove image';
                        removeBtn.addEventListener('click', () => container.remove());
                        container.appendChild(img);
                        container.appendChild(removeBtn);
                        previewArea.appendChild(container);
                    };
                    reader.readAsDataURL(file);

                    // Attempt to upload file to the server for permanent storage
                    const publicUrl = await uploadFileToServer(file);
                    if (publicUrl) {
                        console.log('Image uploaded to:', publicUrl);
                    }
                }
            }
            fileInput.value = '';
        });
    </script>
</body>
</html>
