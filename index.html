<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT | Web Builder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #f5f5f5; font-family: "Inter", sans-serif; }
        .loader-container { display: flex; justify-content: center; align-items: center; height: 100%; width: 100%; position: absolute; top: 0; left: 0; background: #f5f5f5; z-index: 9999; transition: opacity 0.5s ease; }
        .loader-text { color: #151617; font-size: 16px; font-weight: 500; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <!-- Ctrl+U karne par sirf yeh loading text dikhega, asli iframe source mein nahi hoga -->
    <div id="secure-env">
        <div class="loader-container" id="main-loader">
            <div class="loader-text">Initializing Secure Environment...</div>
        </div>
    </div>

    <script>
        // 1. Core Protections (Disable Right-Click and Common Source Shortcuts)
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (
                e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && e.key === 'I') || 
                (e.ctrlKey && e.shiftKey && e.key === 'J') || 
                (e.ctrlKey && e.key === 'u') || 
                (e.ctrlKey && e.key === 's')
            ) {
                e.preventDefault();
                return false;
            }
        });

        // 2. Fetching Encrypted Payload directly from your JAVIS.AI Repo
        const repoOwner = "muhammadtaqi512q-oss";
        const repoName = "JAVIS.AI";
        const filePath = "data.txt";
        const branch = "main";

        const targetUrl = `https://raw.githubusercontent.com/${repoOwner}/${repoName}/${branch}/${filePath}`;

        fetch(targetUrl)
            .then(response => {
                if (!response.ok) throw new Error("Security handshake failed.");
                return response.text();
            })
            .then(encryptedData => {
                // Base64 string ko runtime par decode karke HTML banana
                const decryptedHTML = atob(encryptedData.trim());
                
                // DOM mein inject karna
                const rootNode = document.getElementById('secure-env');
                rootNode.innerHTML = decryptedHTML;

                // Iframe loading optimization aur focus handoff
                const iframe = document.getElementById("preview-iframe");
                if (iframe) {
                    iframe.addEventListener("load", () => {
                        const loader = document.getElementById("main-loader");
                        if(loader) loader.style.opacity = "0";
                        setTimeout(() => loader?.remove(), 500);
                        iframe.focus();
                    });
                }
            })
            .catch(error => {
                console.error("Auth Error");
                const loaderText = document.querySelector(".loader-text");
                if(loaderText) loaderText.innerText = "Security Handshake Failed.";
            });
    </script>
</body>
</html>
